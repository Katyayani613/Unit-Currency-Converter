<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>🌍 Unit & Currency Converter</title>

<style>
    *{
        margin:0;
        padding:0;
        box-sizing:border-box;
        font-family: Arial, sans-serif;
    }

    body{
        background: linear-gradient(135deg,#667eea,#764ba2);
        display:flex;
        justify-content:center;
        align-items:center;
        min-height:100vh;
        padding:20px;
    }

    .container{
        background:white;
        width:450px;
        padding:30px;
        border-radius:20px;
        box-shadow:0 10px 30px rgba(0,0,0,0.2);
    }

    h1{
        text-align:center;
        margin-bottom:20px;
        color:#333;
    }

    .section{
        margin-bottom:25px;
        padding:20px;
        border-radius:15px;
        background:#f5f5f5;
    }

    h2{
        margin-bottom:15px;
        color:#444;
    }

    input, select, button{
        width:100%;
        padding:12px;
        margin:8px 0;
        border-radius:10px;
        border:1px solid #ccc;
        font-size:16px;
    }

    button{
        background:#667eea;
        color:white;
        border:none;
        cursor:pointer;
        transition:0.3s;
    }

    button:hover{
        background:#5a67d8;
    }

    .result{
        margin-top:10px;
        font-weight:bold;
        color:#222;
        text-align:center;
    }
</style>
</head>
<body>

<div class="container">
    <h1>🌍 Unit & Currency Converter 💱</h1>

    <!-- Currency Converter -->
    <div class="section">
        <h2>💰 Currency Converter</h2>

        <input type="number" id="currencyAmount" placeholder="Enter amount">

        <select id="fromCurrency">
            <option value="USD">USD</option>
            <option value="INR">INR</option>
            <option value="EUR">EUR</option>
            <option value="GBP">GBP</option>
            <option value="JPY">JPY</option>
        </select>

        <select id="toCurrency">
            <option value="INR">INR</option>
            <option value="USD">USD</option>
            <option value="EUR">EUR</option>
            <option value="GBP">GBP</option>
            <option value="JPY">JPY</option>
        </select>

        <button onclick="convertCurrency()">Convert Currency</button>

        <div class="result" id="currencyResult"></div>
    </div>

    <!-- Unit Converter -->
    <div class="section">
        <h2>📏 Unit Converter</h2>

        <select id="conversionType">
            <option value="length">Length</option>
            <option value="weight">Weight</option>
            <option value="temperature">Temperature</option>
        </select>

        <input type="number" id="unitInput" placeholder="Enter value">

        <select id="fromUnit"></select>
        <select id="toUnit"></select>

        <button onclick="convertUnit()">Convert Unit</button>

        <div class="result" id="unitResult"></div>
    </div>
</div>

<script>
// ---------- Currency Converter ----------
async function convertCurrency() {
    const amount = document.getElementById("currencyAmount").value;
    const from = document.getElementById("fromCurrency").value;
    const to = document.getElementById("toCurrency").value;

    if(amount === ""){
        alert("Please enter amount");
        return;
    }

    try {
        const response = await fetch(
            `https://api.exchangerate-api.com/v4/latest/${from}`
        );

        const data = await response.json();
        const rate = data.rates[to];

        const converted = (amount * rate).toFixed(2);

        document.getElementById("currencyResult").innerHTML =
            `${amount} ${from} = ${converted} ${to}`;
    } catch (error) {
        document.getElementById("currencyResult").innerHTML =
            "Error fetching exchange rate.";
    }
}

// ---------- Unit Converter ----------
const units = {
    length: ["Meter", "Kilometer", "Centimeter"],
    weight: ["Gram", "Kilogram", "Pound"],
    temperature: ["Celsius", "Fahrenheit", "Kelvin"]
};

const fromUnit = document.getElementById("fromUnit");
const toUnit = document.getElementById("toUnit");
const conversionType = document.getElementById("conversionType");

function populateUnits() {
    const type = conversionType.value;

    fromUnit.innerHTML = "";
    toUnit.innerHTML = "";

    units[type].forEach(unit => {
        fromUnit.innerHTML += `<option>${unit}</option>`;
        toUnit.innerHTML += `<option>${unit}</option>`;
    });
}

conversionType.addEventListener("change", populateUnits);
populateUnits();

function convertUnit() {
    const value = parseFloat(document.getElementById("unitInput").value);
    const from = fromUnit.value;
    const to = toUnit.value;
    const type = conversionType.value;

    if(isNaN(value)){
        alert("Please enter a value");
        return;
    }

    let result;

    // Length
    if(type === "length"){
        let meters;

        if(from === "Meter") meters = value;
        if(from === "Kilometer") meters = value * 1000;
        if(from === "Centimeter") meters = value / 100;

        if(to === "Meter") result = meters;
        if(to === "Kilometer") result = meters / 1000;
        if(to === "Centimeter") result = meters * 100;
    }

    // Weight
    if(type === "weight"){
        let grams;

        if(from === "Gram") grams = value;
        if(from === "Kilogram") grams = value * 1000;
        if(from === "Pound") grams = value * 453.592;

        if(to === "Gram") result = grams;
        if(to === "Kilogram") result = grams / 1000;
        if(to === "Pound") result = grams / 453.592;
    }

    // Temperature
    if(type === "temperature"){
        let celsius;

        if(from === "Celsius") celsius = value;
        if(from === "Fahrenheit")
            celsius = (value - 32) * 5/9;
        if(from === "Kelvin")
            celsius = value - 273.15;

        if(to === "Celsius") result = celsius;
        if(to === "Fahrenheit")
            result = (celsius * 9/5) + 32;
        if(to === "Kelvin")
            result = celsius + 273.15;
    }

    document.getElementById("unitResult").innerHTML =
        `${value} ${from} = ${result.toFixed(2)} ${to}`;
}
</script>

</body>
</html>
